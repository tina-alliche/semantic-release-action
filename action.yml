name: 'Semantic Release with Jira'
description: 'Automatise le versioning avec Semantic Release et intégration Jira pour Desjardins'
author: 'Desjardins DevOps'

branding:
  icon: 'tag'
  color: 'green'

inputs:
  branches:
    description: 'Branches pour les releases (JSON array). Exemple: ["main", "master", "develop"]'
    required: false
    default: '["main", "master"]'
  jira-host:
    description: 'Domaine Jira pour générer les liens (ex: jira.desjardins.com)'
    required: false
    default: 'jira.desjardins.com'
  github-token:
    description: 'Token GitHub pour créer releases et tags (utiliser secrets.GITHUB_TOKEN)'
    required: true

outputs:
  new-version:
    description: 'Nouvelle version générée (ex: 1.2.3). Vide si aucune release.'
    value: ${{ steps.semantic.outputs.new-release-version }}
  new-release-published:
    description: 'true si une nouvelle release a été publiée, false sinon'
    value: ${{ steps.semantic.outputs.new-release-published }}
  artifactory-repo:
    description: 'Repository Artifactory recommandé (release-candidates-local ou snapshots-local)'
    value: ${{ steps.determine-repo.outputs.artifactory-repo }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Semantic Release and plugins
      shell: bash
      run: |
        echo "📦 Installation de Semantic Release et plugins..."
        npm install -g \
          semantic-release@23 \
          @semantic-release/commit-analyzer@13 \
          @semantic-release/release-notes-generator@14 \
          @semantic-release/git@10 \
          @semantic-release/github@10 \
          @semantic-release/changelog@6 \
          @semantic-release/exec@6 \
          semantic-release-jira-notes@4 \
          conventional-changelog-conventionalcommits@8
        echo "✅ Installation terminée"

    - name: Configure Semantic Release
      shell: bash
      run: |
        echo "⚙️ Configuration de Semantic Release..."
        
        # Vérifier si un fichier .releaserc.json existe déjà dans le projet
        if [ -f ".releaserc.json" ]; then
          echo "📄 Configuration personnalisée détectée: .releaserc.json"
          echo "✅ Utilisation de la configuration du projet"
        
          # Afficher la configuration pour debug
          echo "Configuration utilisée:"
          cat .releaserc.json
        else
          echo "📝 Aucune configuration personnalisée trouvée"
          echo "✅ Utilisation de la configuration par défaut"
        
          # Créer la configuration par défaut
          cat > .releaserc.json << 'EOF'
        {
          "branches": ${{ inputs.branches }},
          "plugins": [
            "@semantic-release/commit-analyzer",
            [
              "semantic-release-jira-notes",
              {
                "jiraHost": "${{ inputs.jira-host }}",
                "preset": "conventionalcommits",
                "presetConfig": {
                  "types": [
                    { "type": "feat", "section": "Features" },
                    { "type": "fix", "section": "Bug Fixes" },
                    { "type": "perf", "section": "Performance Improvements" },
                    { "type": "revert", "section": "Reverts" },
                    { "type": "docs", "section": "Documentation", "hidden": false },
                    { "type": "style", "section": "Styles", "hidden": true },
                    { "type": "chore", "section": "Miscellaneous Chores", "hidden": true },
                    { "type": "refactor", "section": "Code Refactoring", "hidden": true },
                    { "type": "test", "section": "Tests", "hidden": true },
                    { "type": "build", "section": "Build System", "hidden": true },
                    { "type": "ci", "section": "Continuous Integration", "hidden": true }
                  ]
                }
              }
            ],
            [
              "@semantic-release/changelog",
              {
                "changelogFile": "CHANGELOG.md"
              }
            ],
            [
              "@semantic-release/exec",
              {
                "prepareCmd": "echo ${nextRelease.version} > .version"
              }
            ],
            [
              "@semantic-release/git",
              {
                "assets": ["CHANGELOG.md"],
                "message": "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
              }
            ],
            "@semantic-release/github"
          ]
        }
        EOF
        fi
        
        echo "✅ Configuration prête"

    - name: Run Semantic Release
      id: semantic
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "🚀 Exécution de Semantic Release"
        echo "Branch actuelle: ${{ github.ref_name }}"
        
        # Déterminer si on est sur une branche de release
        IS_RELEASE_BRANCH=false
        CURRENT_BRANCH="${{ github.ref_name }}"
        
        for branch in $(echo '${{ inputs.branches }}' | jq -r '.[]'); do
          if [[ "$CURRENT_BRANCH" == "$branch" ]]; then
            IS_RELEASE_BRANCH=true
            echo "✅ Branche de release détectée: $branch"
            break
          fi
        done
        
        # Exécuter Semantic Release
        if [ "$IS_RELEASE_BRANCH" = true ]; then
          echo "📝 Mode: Release complète"
          npx semantic-release 2>&1 | tee semantic-output.txt || true
        else
          echo "🧪 Mode: Dry-run (analyse uniquement)"
          npx semantic-release --dry-run 2>&1 | tee semantic-output.txt || true
        fi
        
        cat semantic-output.txt
        
        # Extraire la version générée
        if grep -q "Published release" semantic-output.txt; then
          VERSION=$(grep -oP "(?<=Published release )\d+\.\d+\.\d+" semantic-output.txt | head -1)
          echo "✅ Release publiée: $VERSION"
          echo "new-release-version=$VERSION" >> $GITHUB_OUTPUT
          echo "new-release-published=true" >> $GITHUB_OUTPUT
        elif grep -q "The next release version is" semantic-output.txt; then
          VERSION=$(grep -oP "(?<=version is )\d+\.\d+\.\d+" semantic-output.txt | head -1)
          echo "✅ Prochaine version: $VERSION"
          echo "new-release-version=$VERSION" >> $GITHUB_OUTPUT
          echo "new-release-published=true" >> $GITHUB_OUTPUT
        else
          echo "ℹ️ Aucune nouvelle release"
          echo "new-release-published=false" >> $GITHUB_OUTPUT
        fi

    - name: Determine Artifactory Repository
      id: determine-repo
      shell: bash
      run: |
        IS_RELEASE_BRANCH=false
        CURRENT_BRANCH="${{ github.ref_name }}"
        
        for branch in $(echo '${{ inputs.branches }}' | jq -r '.[]'); do
          if [[ "$CURRENT_BRANCH" == "$branch" ]]; then
            IS_RELEASE_BRANCH=true
            break
          fi
        done
        
        if [ "$IS_RELEASE_BRANCH" = true ]; then
          echo "artifactory-repo=release-candidates-local" >> $GITHUB_OUTPUT
          echo "📦 Repository Artifactory: release-candidates-local"
        else
          echo "artifactory-repo=snapshots-local" >> $GITHUB_OUTPUT
          echo "📦 Repository Artifactory: snapshots-local"
        fi
